---
# Hooks that run the system-installed (mise-pinned) tool from PATH — no Docker,
# no from-source compile. The tool's version lives in the consumer's mise.toml
# (single source of truth), so it never drifts from a hook's own pin.
# See README.md for usage with prek / pre-commit and mise.

- id: actionlint
  name: Lint GitHub Actions workflow files
  description: Runs system-installed actionlint to lint GitHub Actions workflow files
  entry: hooks/run-tool.sh actionlint
  language: script
  types: [yaml]
  files: ^\.github/workflows/
  minimum_pre_commit_version: 3.0.0

- id: shellcheck
  name: ShellCheck
  description: Static analysis tool for shell scripts
  entry: hooks/run-tool.sh shellcheck
  language: script
  types: [shell]
  exclude: '\.(zsh|fish)$'

- id: gitleaks
  name: Detect hardcoded secrets
  description: Detect hardcoded secrets using Gitleaks
  entry: hooks/run-tool.sh gitleaks git --pre-commit --redact --staged --verbose
  language: script
  pass_filenames: false

- id: pin-github-actions
  name: Pin & verify GitHub Action SHAs
  description: 'Pin GitHub Action uses: refs to commit SHAs and verify existing pins'
  entry: hooks/pin-github-actions.py
  language: script
  files: ^(\.github/(workflows|actions/[^/]+)/.*\.ya?ml|action\.ya?ml)$

- id: sqlfluff-lint
  name: sqlfluff-lint
  description: Lints sql files with `SQLFluff`
  entry: hooks/run-tool.sh sqlfluff lint --processes 0 --disable-progress-bar
  language: script
  types: [sql]
  require_serial: true

- id: sqlfluff-fix
  name: sqlfluff-fix
  description: Fixes sql lint errors with `SQLFluff`
  entry: hooks/run-tool.sh sqlfluff fix --show-lint-violations --processes 0 --disable-progress-bar
  language: script
  types: [sql]
  require_serial: true

- id: system-tool
  name: Run a system tool
  description: 'Run any PATH-installed tool via run-tool.sh (tool + args supplied by the consumer; set pass_filenames: false for tools that manage their own file selection)'
  entry: hooks/run-tool.sh
  language: script

- id: ruff-check
  name: ruff check
  description: Run 'ruff check' for extremely fast Python linting
  entry: hooks/run-tool.sh ruff check --force-exclude
  language: script
  types_or: [python, pyi, jupyter]
  require_serial: true

- id: ruff-format
  name: ruff format
  description: Run 'ruff format' for extremely fast Python formatting
  entry: hooks/run-tool.sh ruff format --force-exclude
  language: script
  types_or: [python, pyi, jupyter]
  require_serial: true

- id: typos
  name: typos
  description: Source code spell checker
  entry: hooks/run-tool.sh typos --write-changes --force-exclude
  language: script
  types: [text]

- id: rumdl
  name: rumdl
  description: 'Lint Markdown files. Exits 1 if violations are found. Add args [--fix]'
  entry: hooks/run-tool.sh rumdl check
  language: script
  types: [markdown]
  require_serial: true

- id: rumdl-fmt
  name: rumdl fmt
  description: Format Markdown files in place. Always exits 0; relies on pre-commit
  entry: hooks/run-tool.sh rumdl fmt
  language: script
  types: [markdown]
  require_serial: true

- id: codespell
  name: codespell
  description: Checks for common misspellings in text files.
  entry: hooks/run-tool.sh codespell
  language: script
  types: [text]

- id: mypy
  name: mypy
  description: Optional static typing for Python
  entry: hooks/run-tool.sh mypy --ignore-missing-imports --scripts-are-modules
  language: script
  types_or: [python, pyi]
  require_serial: true

- id: uv-lock
  name: uv-lock
  description: Automatically run 'uv lock' on your project dependencies
  entry: hooks/run-tool.sh uv lock
  language: script
  files: ^(uv\.lock|pyproject\.toml|uv\.toml)$
  pass_filenames: false
