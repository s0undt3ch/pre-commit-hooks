name: CI
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4

      - run: mise install
      - run: uv sync

      - name: Run pre-commit hooks (prek)
        env:
          GH_TOKEN: ${{ github.token }}
        run: prek run --all-files --show-diff-on-failure

      - name: Run tests
        run: uv run pytest -v
