name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4
      - run: mise install
      - run: uv sync
      - name: Run pre-commit hooks (prek)
        env:
          GH_TOKEN: ${{ github.token }}
        run: prek run --all-files --show-diff-on-failure
      - name: Run tests
        run: uv run pytest -v
