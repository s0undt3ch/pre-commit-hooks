name: CI
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4

      - run: mise install
      - run: uv sync

      - name: Run pre-commit hooks (prek)
        env:
          GH_TOKEN: ${{ github.token }}
        run: prek run --all-files --show-diff-on-failure

      - name: Run tests
        run: uv run pytest -v
