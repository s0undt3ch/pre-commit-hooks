---
minimum_pre_commit_version: 3.0.0
repos:
  - repo: local
    hooks:
      - id: actionlint
        name: Lint GitHub Actions workflow files
        entry: hooks/run-tool.sh actionlint
        language: script
        types: [yaml]
        files: ^\.github/workflows/

      - id: shellcheck
        name: ShellCheck
        entry: hooks/run-tool.sh shellcheck
        language: script
        types: [shell]
        exclude: '\.(zsh|fish)$'

      - id: gitleaks
        name: Detect hardcoded secrets
        entry: hooks/run-tool.sh gitleaks git --pre-commit --redact --staged --verbose
        language: script
        pass_filenames: false

      - id: pin-github-actions
        name: Pin & verify GitHub Action SHAs
        entry: hooks/pin-github-actions.py
        language: script
        files: ^(\.github/(workflows|actions/[^/]+)/.*\.ya?ml|action\.ya?ml)$

      - id: ruff-check
        name: ruff check
        entry: hooks/run-tool.sh ruff check --force-exclude
        language: script
        types_or: [python, pyi, jupyter]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: hooks/run-tool.sh ruff format --force-exclude
        language: script
        types_or: [python, pyi, jupyter]
        require_serial: true
      - id: typos
        name: typos
        entry: hooks/run-tool.sh typos --write-changes --force-exclude
        language: script
        types: [text]
        exclude: ^(docs/|uv\.lock$)
      - id: rumdl
        name: rumdl
        entry: hooks/run-tool.sh rumdl check
        language: script
        types: [markdown]
        require_serial: true
        exclude: ^docs/
      - id: codespell
        name: codespell
        entry: hooks/run-tool.sh codespell
        language: script
        types: [text]
        exclude: ^(docs/|uv\.lock$)
      - id: mypy
        name: mypy
        entry: hooks/run-tool.sh mypy --ignore-missing-imports --scripts-are-modules
        language: script
        types_or: [python, pyi]
        require_serial: true
      - id: uv-lock
        name: uv-lock
        entry: hooks/run-tool.sh uv lock
        language: script
        files: ^(uv\.lock|pyproject\.toml|uv\.toml)$
        pass_filenames: false
